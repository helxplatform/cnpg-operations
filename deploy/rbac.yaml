---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cnpg-rest-server
  namespace: default
  labels:
    app.kubernetes.io/name: cnpg-rest-server
    app.kubernetes.io/component: rbac

---
# ClusterRole grants access to CNPG custom resources cluster-wide
# and to Secrets in all namespaces (for role password management).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cnpg-rest-server
  labels:
    app.kubernetes.io/name: cnpg-rest-server
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["databases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cnpg-rest-server
  labels:
    app.kubernetes.io/name: cnpg-rest-server
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cnpg-rest-server
subjects:
  - kind: ServiceAccount
    name: cnpg-rest-server
    namespace: default
