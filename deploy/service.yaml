---
apiVersion: v1
kind: Service
metadata:
  name: cnpg-rest-server
  namespace: default
  labels:
    app.kubernetes.io/name: cnpg-rest-server
    app.kubernetes.io/component: server
spec:
  selector:
    app.kubernetes.io/name: cnpg-rest-server
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  type: ClusterIP

---
