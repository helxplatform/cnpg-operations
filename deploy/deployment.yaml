---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cnpg-rest-server
  namespace: default
  labels:
    app.kubernetes.io/name: cnpg-rest-server
    app.kubernetes.io/component: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cnpg-rest-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cnpg-rest-server
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: cnpg-rest-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cnpg-rest-server
          image: cnpg-rest-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: GIN_MODE
              value: "release"
            # Override the default namespace if needed
            # - name: DEFAULT_NAMESPACE
            #   value: "default"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: cnpg-rest-server
