# Default values for cnpg-operations.

replicaCount: 2

image:
  repository: containers.renci.org/helxplatform/cnpg-rest-server
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

rbac:
  # Create RoleBindings in the release namespace.
  create: true
  # Pre-existing ClusterRoles (installed by the CNPG operator) to bind.
  # Helm-based operator installs: "<release>-cloudnative-pg-edit"
  # Kustomize-based installs: "cluster-editor-role", "database-editor-role"
  clusterRoles:
    - cnpg-cloudnative-pg-edit

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# Environment variables for the server container.
# PORT and GIN_MODE are always set; add DEFAULT_NAMESPACE here to override the default namespace.
env:
  PORT: "8080"
  GIN_MODE: "release"
  # DEFAULT_NAMESPACE: "default"

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels: {}  # filled in by the template using selectorLabels

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
